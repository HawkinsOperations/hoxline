name: Hoxline Claim Authority Check
description: Run Hoxline Claim Authority wording checks using the internal Claim Firewall capability.
inputs:
  paths:
    description: Space-separated files or directories in the caller repository to scan.
    required: false
    default: "."
  policy:
    description: Optional path to blocked claims policy. Defaults to the bundled policy.
    required: false
    default: ""
  exclude:
    description: Space-separated glob patterns to exclude.
    required: false
    default: ""
  format:
    description: Output format, either text or json.
    required: false
    default: "text"
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install Hoxline Claim Authority checker
      shell: bash
      run: python -m pip install "${{ github.action_path }}"
    - name: Run Hoxline Claim Authority check
      shell: bash
      run: |
        policy="${{ inputs.policy }}"
        if [ -z "$policy" ]; then
          policy="${{ github.action_path }}/policy/blocked_claims.yml"
        fi

        exclude_args=()
        if [ -n "${{ inputs.exclude }}" ]; then
          read -r -a exclude_patterns <<< "${{ inputs.exclude }}"
          for pattern in "${exclude_patterns[@]}"; do
            exclude_args+=(--exclude "$pattern")
          done
        fi

        claimfirewall scan ${{ inputs.paths }} --policy "$policy" --format "${{ inputs.format }}" "${exclude_args[@]}"
